name: Build and Deploy Apps

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore NET Tools
        run: dotnet tool restore
        
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: ./src/ShoppingList.Server

      - name: Build ShoppingList Web Elements
        run: npm run sass-prod
        working-directory: ./src/ShoppingList.Server

      - name: Build ShoppingList.Web
        run: dotnet build --configuration Release ShoppingList.Server.csproj
        working-directory: ./src/ShoppingList.Server

      - name: Check for Pending Database Changes
        run: dotnet ef migrations has-pending-model-changes --configuration Release --project ../ShoppingList.Data/ShoppingList.Data.csproj --no-build
        working-directory: ./src/ShoppingList.Server
    
      - name: Publish Project
        run: dotnet publish -r win-x86 --self-contained -o ./publish
        working-directory: ./src/ShoppingList.Server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shoppinglist
          path: ./src/ShoppingList.Server/publish

      - name: Create migration bundle
        run: dotnet ef migrations bundle --configuration Release --project ../ShoppingList.Data/ShoppingList.Data.csproj --no-build --self-contained -r linux-x64
        working-directory: ./src/ShoppingList.Server

      - name: Upload migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: shoppinglist-migrations
          path: ./src/ShoppingList.Server/efbundle

